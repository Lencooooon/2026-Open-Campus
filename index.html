<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ソートアルゴリズム可視化</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>ソートアルゴリズム可視化</h1>
    </header>

    <main>

        <!-- ===== 操作パネル ===== -->
        <section id="control-panel">

            <div class="control-group">
                <label for="algorithm">アルゴリズム</label>

                <select id="algorithm">
                    <option value="bubble">バブルソート</option>
                    <option value="selection">選択ソート</option>
                    <option value="insertion">挿入ソート</option>
                    <option value="quick">クイックソート</option>
                    <option value="merge">マージソート</option>
                </select>
            </div>

            <div class="control-group">
                <label for="size">要素数</label>
                <input type="range" id="size" min="10" max="100" value="50">
            </div>

            <div class="control-group">
                <label for="speed">速度</label>
                <input type="range" id="speed" min="1" max="100" value="50">
            </div>

            <div class="buttons">
                <button id="shuffle-btn">シャッフル</button>
                <button id="start-btn">開始</button>
                <button id="pause-btn">一時停止</button>
            </div>

        </section>

        <!-- ===== ソート表示エリア ===== -->
        <section id="visualizer">

        </section>

        <!-- ===== 情報表示 ===== -->
        <section id="info-panel">

            <h2>実行情報</h2>

            <p>比較回数：<span id="compare-count">0</span></p>

            <p>交換回数：<span id="swap-count">0</span></p>

            <p>時間計算量：<span id="time-complexity">-</span></p>

            <p>現在の状態：<span id="status">待機中</span></p>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
